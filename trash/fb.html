<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>button fb</title>

    <style>
        .fanpage-btn {
            display: inline-block;
            padding: 12px 28px;
            font-family: sans-serif;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            background-color: #1877F2;
            text-decoration: none;
            border-radius: 8px; 
            transition: 0.3s; 
        }

        .fanpage-btn:hover {
            background-color: #021d38; 
        }
    </style>
</head>
<body>

    <a href="https://www.facebook.com/epu.edu.vn" target="_blank" class="fanpage-btn">
        FANPAGE
    </a>

</body>
</html>
